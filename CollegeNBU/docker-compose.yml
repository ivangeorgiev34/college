version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_2022
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=<Password>
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always

  web_app:
    image: my-mvc-app:latest
    build:
      context: .
      dockerfile: ./CollegeNBU/Dockerfile
    container_name: aspnet_mvc_app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - sqlserver
    restart: always

volumes:
  mssql_data: